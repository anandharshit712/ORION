scenario:
  name: "LON-002 Lead Vehicle Hard Brake"
  version: "2.0"
  description: >
    Lead vehicle performs a two-stage hard brake. Initial decel, duration of first
    phase, and whether a hesitation pause occurs are all randomised each run.
    Ego closing speed and initial gap are also varied. Pattern-learning is blocked.
  duration: 20.0

ego:
  initial:
    x: 0.0
    y: -1.75
    heading: 0.0
    velocity: 22.22
  constraints:
    max_velocity: 33.33
    max_acceleration: 3.0
    max_deceleration: 8.0
    max_steering: 0.5

environment:
  road:
    type: highway
    lanes: 2
    lane_width: 3.5
    speed_limit: 27.78
  weather:
    condition: clear
    visibility: 1000.0

traffic:
  - id: lead_vehicle
    type: car
    initial:
      x: 40.0
      y: -1.75
      heading: 0.0
      velocity: 13.89
    behavior:
      type: reactive_vehicle
      parameters:
        bt_type: hesitant_brake
        trigger_type: proximity
        trigger_value: 30.0
        initial_decel: -5.0
        initial_brake_duration:
          min: 0.2
          max: 0.8
        hesitation_prob: 0.35
        hesitation_duration:
          min: 0.15
          max: 0.6
        hesitation_accel:
          min: 1.0
          max: 3.0
        final_decel: -8.0
        min_velocity: 0.0
        max_velocity: 35.0

termination:
  conditions:
    - collision
    - off_road
    - timeout
  timeout: 20.0

master_seed: 1002

parameterization:
  ego_velocity:
    min: 19.44    # 70 km/h
    max: 27.78    # 100 km/h
  npc_overrides:
    lead_vehicle:
      initial_velocity:
        min: 8.33     # 30 km/h
        max: 16.67    # 60 km/h
      initial_x:
        min: 35.0
        max: 55.0
      parameters:
        trigger_value:
          min: 20.0
          max: 40.0
        initial_decel:
          min: -7.0
          max: -3.5
        hesitation_prob:
          min: 0.1
          max: 0.6
        final_decel:
          min: -9.81
          max: -6.0
