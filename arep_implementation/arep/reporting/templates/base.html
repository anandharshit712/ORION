<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ORION Evaluation Report{% endblock %}</title>
  <style>
    /* ORION Report Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11pt; color: #1a1a2e; line-height: 1.5; }
    .page { width: 210mm; padding: 20mm 18mm; }
    h1 { font-size: 22pt; color: #0f3460; border-bottom: 3px solid #e94560; padding-bottom: 8px; margin-bottom: 20px; }
    h2 { font-size: 14pt; color: #0f3460; margin: 24px 0 12px; }
    h3 { font-size: 11pt; color: #16213e; margin: 16px 0 8px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; border-bottom: 1px solid #ddd; padding-bottom: 16px; }
    .header .logo { font-size: 20pt; font-weight: bold; color: #0f3460; letter-spacing: 2px; }
    .header .meta { text-align: right; font-size: 9pt; color: #666; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 10pt; }
    th { background: #0f3460; color: white; padding: 8px 10px; text-align: left; }
    td { padding: 7px 10px; border-bottom: 1px solid #eee; }
    tr:nth-child(even) td { background: #f8f9fa; }
    .score-pass { color: #2d7a2d; font-weight: bold; }
    .score-fail { color: #c0392b; font-weight: bold; }
    .score-warn { color: #e67e22; font-weight: bold; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 10pt; }
    .badge-pass { background: #d4edda; color: #155724; }
    .badge-fail { background: #f8d7da; color: #721c24; }
    .footer { margin-top: 40px; padding-top: 12px; border-top: 1px solid #ddd; font-size: 9pt; color: #888; text-align: center; }
    .metric-row { display: flex; gap: 16px; margin: 16px 0; }
    .metric-card { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 12px; text-align: center; }
    .metric-card .value { font-size: 20pt; font-weight: bold; color: #0f3460; }
    .metric-card .label { font-size: 9pt; color: #666; margin-top: 4px; }
    .methodology { background: #f8f9fa; border-left: 4px solid #0f3460; padding: 12px 16px; margin: 16px 0; font-size: 10pt; }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo">ORION</div>
    <div class="meta">
      <div>Autonomous Robustness Evaluation Platform</div>
      <div>Generated: {{ generated_at }}</div>
      <div>Organisation: {{ org_name }}</div>
    </div>
  </div>
  {% block content %}{% endblock %}
  <div class="footer">
    ORION Evaluation Report — Confidential — {{ generated_at }}<br>
    Scores computed using AREP v1.0 | Safety×0.50 + Compliance×0.20 + Stability×0.15 + Reactivity×0.15
  </div>
</div>
</body>
</html>
