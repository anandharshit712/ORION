scenario:
  name: "straight_road_empty"
  version: "1.0"
  description: "Ego vehicle on an empty straight road — baseline test"
  duration: 30.0

ego:
  initial:
    x: 0.0
    y: 0.0
    heading: 0.0
    velocity: 15.0

  constraints:
    max_velocity: 30.0
    max_acceleration: 3.0
    max_deceleration: 8.0
    max_steering: 0.5

environment:
  road:
    type: "highway"
    lanes: 2
    lane_width: 3.5
    speed_limit: 27.8

  weather:
    condition: "clear"
    visibility: 1000.0

traffic: []

events: []

termination:
  conditions:
    - collision
    - off_road
    - timeout
  timeout: 30.0
