name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        working-directory: arep_implementation
        run: pip install -e ".[dev]"
      - name: Black
        working-directory: arep_implementation
        run: black --check arep/ tests/
      - name: Ruff
        working-directory: arep_implementation
        run: ruff check arep/ tests/
      - name: Mypy
        working-directory: arep_implementation
        run: mypy arep/
